<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

        body {

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;

    </style>
</head>
<body class="bg-black text-white">

                    <div class="flex flex-col items-center">

                    <a href="#" class="hover:text-red-500 transition">المتصدّرين</a>
                </div>

        <main class="flex-grow flex flex-col justify-end p-12">

                <div class="mt-8 flex gap-4 text-3xl">
                    <a href="https://discord.gg/CwZftmkaH" target="_blank" class="text-white hover:text-red-600 transition duration-300">

                    <a href="https://www.tiktok.com/@golden.city3000" target="_blank" class="text-white hover:text-red-600 transition duration-300">
