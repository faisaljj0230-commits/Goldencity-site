<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        
        /* الخلفية المظلمة */
        .bg-img { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://files.catbox.moe/helkbi.jpeg') center/cover no-repeat;
            filter: brightness(0.3); /* تقليل الإضاءة لتظهر الصورة كما في لقطتك */
        }

        /* الهيدر: شفاف تماماً */
        header { 
            position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 50px; z-index: 10;
        }
        
        .header-right { font-weight: 900; font-size: 1.5rem; }
        .header-center { display: flex; gap: 30px; }
        .header-center a { color: #fff; text-decoration: none; font-size: 0.95rem; }
        .header-left { display: flex; align-items: center; gap: 15px; }

        /* الأزرار كما في صورتك */
        .btn-small { padding: 6px 18px; border-radius: 4px; text-decoration: none; font-size: 0.85rem; font-weight: bold; }
        .btn-orange { background: #ff6600; color: #fff; border: none; }
        .btn-login { border: 1px solid #fff; color: #fff; }
        
        /* المحتوى واللوجو */
        .main-content { position: absolute; right: 5%; bottom: 10%; text-align: right; }
        .big-logo { color: #ff6600; font-size: 70px; font-weight: 900; }
        .thanks { font-size: 3rem; font-weight: 900; margin-top: -20px; }
        .desc { color: #fff; max-width: 400px; }
        .footer-icons { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="bg-img"></div>

    <header>
        <div class="header-right">DREAM TOWN</div>
        <div class="header-center">
            <a href="#">المتصدرين</a> <a href="#">الأسئلة</a> <a href="#">الوظائف</a>
            <a href="#">البث المباشر</a> <a href="#">الفريق</a> <a href="#">صناع المحتوى</a> <a href="#">الرئيسية</a>
        </div>
        <div class="header-left">
            🌐 <a href="#" class="btn-small btn-login">تسجيل الدخول</a> <a href="#" class="btn-small btn-orange">المتجر</a>
        </div>
    </header>

    <div class="main-content">
        <h1 class="thanks">شكراً لكم</h1>
        <p class="desc">أفضل تجربة حياة واقعية في GTA V، تضم لأكثر من 300 ألف لاعب في عالم مليء بالأحداث والقصص التي لا تنتهي.</p>
        <div class="footer-icons">
            <!-- الأيقونات في الأسفل كما طلبت -->
            <img src="https://cdn-icons-png.flaticon.com/512/3670/3670151.png" width="25">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/57/X_logo_2023.svg" width="25" style="filter: invert(1);">
        </div>
    </div>
</body>
</html>
