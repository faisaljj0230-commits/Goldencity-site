<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Golden City RP</title>
    <style>
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), 
                        url('https://cdn.discordapp.com/attachments/1500948461044895864/1517948188403826698/IMG_4212.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .page { display: none; padding: 40px; }
        .active { display: block !important; }
        .member-card { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; text-align: center; width: 200px; transition: transform 0.3s; }
        .member-card:hover { transform: translateY(-5px); }
        .social-btn { background: rgba(255, 255, 255, 0.1); padding: 12px 20px; border-radius: 10px; display: flex; align-items: center; gap: 10px; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white font-sans">

    <nav class="w-full p-6 flex justify-between items-center">
        <div class="font-bold text-xl cursor-pointer" onclick="showPage('main-content')">GOLDEN CITY</div>
        <ul class="flex gap-6 font-medium text-sm">
            <li class="hover:text-purple-400 cursor-pointer" onclick="showPage('main-content')">الرئيسية</li>
            <li class="hover:text-purple-400 cursor-pointer" onclick="showPage('team-page')">الفريق</li>
        </ul>
    </nav>

    <main id="main-content" class="page active w-full h-[70vh] flex flex-col justify-center items-start pr-16">
        <h1 class="text-purple-400 font-bold tracking-[0.2em] mb-6 uppercase">GC حيث تصبح الاحلام حقيقه</h1>
        <p class="text-gray-300 max-w-lg text-lg leading-relaxed mb-8 border-r-4 border-purple-500 pr-6">
            في Golden City، نحن لا نبني مجرد مدينة، نحن نصنع أسطورة تعيشها بتفاصيلها.
        </p>
        <div class="flex gap-4">
            <a href="https://discord.gg/CwZftmkaH" class="social-btn"><i class="fab fa-discord"></i> Discord</a>
        </div>
    </main>

    <section id="team-page" class="page">
        <h2 class="text-4xl font-bold text-center mb-16">الفريق الإداري</h2>
    </section>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
