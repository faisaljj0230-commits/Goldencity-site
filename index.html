<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden;
               background: url('https://files.catbox.moe/helkbi.jpeg') center/cover no-repeat; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }

        /* شريط التنقل العلوي (Header) */
        header { 
            position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 30px; z-index: 10; box-sizing: border-box; background: rgba(0, 0, 0, 0.4); border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.85rem; }
        
        .logo-box { font-weight: bold; font-size: 1rem; margin-right: 20px; }
        
        /* الأزرار العلوية */
        .btn-small { padding: 5px 12px; border-radius: 4px; text-decoration: none; font-size: 0.8rem; }
        .btn-orange { background: #ff6600; color: #000; font-weight: bold; }
        .btn-login { border: 1px solid #444; color: #fff; margin-right: 10px; }
        .lang-icon { font-size: 1.2rem; cursor: pointer; }

        /* العناصر المتبقية (كما في الكود السابق) */
        .left-side { position: absolute; left: 5%; bottom: 10%; }
        .big-eight { font-size: 250px; font-weight: 900; opacity: 0.1; line-height: 1; }
        .right-side { position: absolute; right: 5%; bottom: 10%; text-align: right; max-width: 400px; }
        .thanks { font-size: 4rem; font-weight: 900; line-height: 1.1; }
        .thanks span { color: #ff6600; }
        .sub-title { font-size: 1.2rem; color: #aaa; margin-top: 10px; }
        .brand-line { font-size: 1.1rem; color: #ff6600; margin-top: 15px; }
        .desc { font-size: 0.9rem; color: #888; margin-top: 10px; line-height: 1.5; }
        .footer-icons { position: absolute; bottom: 20px; right: 5%; display: flex; gap: 15px; }
        .icon { width: 25px; filter: invert(1); cursor: pointer; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <header>
        <div class="nav-left">
            <div class="lang-icon">🌐</div>
            <a href="#" class="btn-small btn-login">تسجيل الدخول</a>
            <a href="#" class="btn-small btn-orange">المتجر</a>
        </div>
        
        <div class="nav-right">
            <div class="nav-links">
                <a href="#">الرئيسية</a>
                <a href="#">صناع المحتوى</a>
                <a href="#">الفريق</a>
                <a href="#">البث المباشر</a>
                <a href="#">الوظائف</a>
                <a href="#">الأسئلة</a>
                <a href="#">المتصدرين</a>
            </div>
            <div class="logo-box">DREAM TOWN</div>
        </div>
    </header>

    <div class="left-side">
        <div class="big-eight">8</div>
    </div>

    <div class="right-side">
        <h1 class="thanks">شكراً <br> <span>لكم</span></h1>
        <div class="sub-title">DREAM TOWN RP - الموسم 8</div>
        <div class="brand-line">DT • حيث تصبح الأحلام حقيقة</div>
        <p class="desc">أفضل تجربة حياة واقعية في GTA V، تضم لأكثر من 300 ألف لاعب في عالم مليء بالأحداث والقصص التي لا تنتهي.</p>
        
        <div class="footer-icons">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/57/X_logo_2023.svg" class="icon">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="icon">
        </div>
    </div>
</body>
</html>
