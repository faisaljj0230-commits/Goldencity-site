<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Golden City RP</title>
    <style>
        body { 
            background: linear-gradient(rgba(76, 29, 149, 0.7), rgba(0, 0, 0, 0.8)), 
                        url('https://cdn.discordapp.com/attachments/1500948461044895864/1517948188403826698/IMG_4212.png?ex=6a3822ea&is=6a36d16a&hm=3dc851c67dc5869775ed8580a92efd4275e7112b25c84efa241d8034b8f63044&');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        #team { display: none; }
        /* كلاس خاص ببطاقات الفريق لضمان وضوحها */
        .team-card {
            background-color: rgba(0, 0, 0, 0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="text-white font-sans">

    <!-- القائمة -->
    <nav class="w-full bg-black/50 backdrop-blur-sm p-6 flex justify-between items-center shadow-lg sticky top-0 z-50">
        <ul class="flex gap-6 font-medium text-sm">
            <li class="hover:text-purple-300 cursor-pointer">الرئيسية</li>
            <li class="hover:text-purple-300 cursor-pointer" onclick="showTeam()">الفريق</li>
        </ul>
        <div class="flex items-center gap-2 font-bold text-lg">
            <div class="w-8 h-8 bg-purple-600 rounded flex items-center justify-center">GC</div>
            <h1>GOLDEN CITY</h1>
        </div>
    </nav>

    <!-- المحتوى الرئيسي -->
    <main class="w-full h-[80vh] flex flex-col justify-center items-start pl-16 text-right" style="padding-right: 4rem;">
        <span class="text-white/60 font-bold tracking-[0.3em] mb-2 uppercase text-lg">GOLDEN CITY</span>
        <h1 class="text-7xl font-black text-white mb-6">حيث تصبح الأحلام حقيقة</h1>
        <p class="text-xl text-gray-200 max-w-lg leading-relaxed mb-10 border-r-4 border-white pr-6">
            والواقع ليس سوى بداية. في Golden City، نحن لا نبني مجرد مدينة، نحن نصنع أسطورة تعيشها بتفاصيلها. عالمك، قرارك، وقصتك التي تُكتب هنا.
        </p>
        <div class="flex items-center gap-6">
            <a href="https://discord.gg/CwZftmkaH" class="bg-white text-purple-900 px-10 py-4 rounded-lg font-bold text-lg hover:bg-gray-200 transition">انضم للسيرفر</a>
            <a href="https://www.tiktok.com/@golden.city3000" target="_blank" class="text-white text-4xl hover:text-purple-300 transition"><i class="fab fa-tiktok"></i></a>
        </div>
    </main>

    <!-- قسم الفريق المُصلح -->
    <section id="team" class="py-20 text-center bg-black/80">
        <h2 class="text-4xl font-bold mb-12 text-white">فريق العمل</h2>
        <div class="flex justify-center gap-8 flex-wrap">
            <!-- البطاقة -->
            <div class="team-card p-8 rounded-2xl w-56 flex flex-col items-center">
                <img src="https://cdn.discordapp.com/attachments/1500948461044895864/1517932663963390011/IMG_7805.jpg" class="w-24 h-24 rounded-full border-2 border-white mb-4 object-cover">
                <h3 class="text-lg font-bold text-white">Abu Muhammad</h3>
                <p class="text-purple-300 text-sm font-semibold">Owner</p>
            </div>
        </div>
    </section>

    <script>
        function showTeam() {
            const teamSection = document.getElementById('team');
            teamSection.style.display = 'block';
            teamSection.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
