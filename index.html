<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Golden City RP</title>
    <style>
        /* خلفية فخمة تدرج بنفسجي مع تعتيم */
        body { 
            background: radial-gradient(circle at 70% 30%, #4c1d95, #000000 70%), 
                        linear-gradient(135deg, #2e1065 0%, #000000 100%);
            min-height: 100vh;
            background-attachment: fixed;
            color: white;
            font-family: sans-serif;
        }
        #team { display: none; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <nav class="w-full p-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-2 font-bold text-xl">
            <div class="w-10 h-10 bg-purple-600 rounded flex items-center justify-center">GC</div>
            <span>GOLDEN CITY</span>
        </div>
        <ul class="flex gap-8 font-medium text-sm text-gray-300">
            <li class="hover:text-white cursor-pointer transition">الرئيسية</li>
            <li class="hover:text-white cursor-pointer transition">صناع المحتوى</li>
            <li class="hover:text-white cursor-pointer transition" onclick="showTeam()">الفريق</li>
            <li class="hover:text-white cursor-pointer transition">البث المباشر</li>
        </ul>
    </nav>

    <main class="h-[80vh] flex flex-col justify-center items-end pr-20 text-right">
        <span class="text-purple-300 font-bold tracking-[0.4em] uppercase mb-4">Welcome to Golden City</span>
        
        <h1 class="text-8xl font-black text-white mb-6">حيث تصبح الأحلام حقيقة</h1>
        
        <p class="text-xl text-gray-400 max-w-lg mb-10 leading-relaxed border-r-4 border-purple-500 pr-6">
            نحن لا نبني مجرد مدينة، نحن نصنع أسطورة تعيشها بتفاصيلها. عالمك، قرارك، وقصتك التي تُكتب هنا.
        </p>
        
        <div class="flex gap-4">
            <a href="https://discord.gg/CwZftmkaH" class="bg-white text-purple-900 px-8 py-4 rounded-lg font-bold hover:bg-gray-200 transition">انضم للسيرفر</a>
            <a href="https://www.tiktok.com/@golden.city3000" target="_blank" class="glass px-8 py-4 rounded-lg font-bold hover:bg-white/10 transition">
                <i class="fab fa-tiktok"></i>
            </a>
        </div>
    </main>

    <section id="team" class="py-20 text-center bg-black/40 backdrop-blur-lg">
        <h2 class="text-4xl font-bold mb-12 text-white">إدارة الفريق</h2>
        <div class="flex justify-center gap-6 flex-wrap">
            <div class="glass p-8 rounded-2xl w-60">
                <img src="https://cdn.discordapp.com/attachments/1500948461044895864/1517932663963390011/IMG_7805.jpg" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-purple-500">
                <h3 class="text-xl font-bold">Abu Muhammad</h3>
                <p class="text-purple-300">Owner</p>
            </div>
        </div>
    </section>

    <script>
        function showTeam() {
            document.getElementById('team').style.display = 'block';
            document.getElementById('team').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
