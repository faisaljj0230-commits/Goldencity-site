<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        .hero-gradient { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1511512578047-dfb367046420?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80'); }
    </style>
</head>
<body class="bg-black text-white hero-gradient min-h-screen bg-cover bg-center">

    <!-- Navbar -->
    <nav class="flex justify-between items-center p-8 container mx-auto">
        <div class="text-2xl font-black italic tracking-tighter">GOLDEN<span class="text-purple-500">CITY</span></div>
        <div class="flex gap-8 text-sm font-light text-gray-400">
            <a href="#" class="hover:text-white transition">الرئيسية</a>
            <a href="#" class="hover:text-white transition">الفريق</a>
            <a href="#" class="hover:text-white transition">البث المباشر</a>
            <a href="#" class="hover:text-white transition">الوظائف</a>
        </div>
        <button class="border border-purple-500 text-purple-500 px-6 py-2 rounded-full hover:bg-purple-500 hover:text-white transition">تسجيل الدخول</button>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-8 mt-24">
        <!-- Badge -->
        <div class="inline-block border border-gray-700 bg-black/50 px-4 py-1 rounded-full text-xs text-purple-300 mb-6">
            رقم 1 كأفضل مجتمع حياة واقعية في الشرق الأوسط
        </div>

        <!-- Heading -->
        <h1 class="text-lg font-light text-purple-400 mb-2 tracking-widest uppercase">
            GC حيث تصبح الاحلام حقيقه
        </h1>

        <!-- Paragraph -->
        <p class="text-gray-300 max-w-lg text-lg leading-relaxed border-r-2 border-white pr-6">
            في Golden City، نحن لا نبني مجرد مدينة، نحن نصنع أسطورة تعيشها بتفاصيلها. عالمك، قرارك، وقصتك التي تُكتب هنا.
        </p>

        <!-- Call to Action -->
        <div class="mt-10 flex gap-4">
            <button class="bg-white text-black px-8 py-3 rounded font-bold hover:bg-purple-500 hover:text-white transition">ابدأ رحلتك</button>
            <button class="bg-transparent border border-white/20 px-8 py-3 rounded text-white hover:bg-white/10 transition">المجتمع (Discord)</button>
        </div>
    </main>

</body>
</html>
