<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Golden City RP</title>
    <style>
        body { 
            background: linear-gradient(rgba(76, 29, 149, 0.7), rgba(0, 0, 0, 0.8)), 
                        url('https://cdn.discordapp.com/attachments/1500948461044895864/1517948188403826698/IMG_4212.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        #team-page { display: none; padding: 40px; }
        .member-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; text-align: center; width: 200px; }
    </style>
</head>
<body class="text-white font-sans">

    <nav class="w-full bg-black/30 backdrop-blur-md p-6 flex justify-between items-center sticky top-0 z-50">
        <ul class="flex gap-6 font-medium text-sm">
            <li class="hover:text-purple-300 cursor-pointer" onclick="location.reload()">الرئيسية</li>
            <li class="hover:text-purple-300 cursor-pointer">صناع المحتوى</li>
            <li class="hover:text-purple-300 cursor-pointer font-bold text-purple-400" onclick="showTeam()">الفريق</li>
            <li class="hover:text-purple-300 cursor-pointer">البث المباشر</li>
            <li class="hover:text-purple-300 cursor-pointer">الوظائف</li>
            <li class="hover:text-purple-300 cursor-pointer">الأسئلة</li>
            <li class="hover:text-purple-300 cursor-pointer">المتصدرين</li>
        </ul>
        <div class="font-bold text-lg">GOLDEN CITY</div>
    </nav>

    <main id="main-content" class="h-[80vh] flex flex-col justify-center items-start pr-16">
        <h1 class="text-7xl font-black mb-6">حيث تصبح الأحلام حقيقة</h1>
        <a href="https://discord.gg/CwZftmkaH" class="bg-white text-purple-900 px-10 py-4 rounded-lg font-bold">انضم للسيرفر</a>
    </main>

    <section id="team-page">
        <h2 class="text-3xl font-bold mb-8 border-r-4 border-purple-500 pr-4">Owners</h2>
        <div class="flex flex-wrap gap-8 mb-12">
            <div class="member-card">
                <img src="https://cdn.discordapp.com/attachments/1500948461044895864/1517932663963390011/IMG_7805.jpg" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-purple-500">
                <h3 class="font-bold">Abu Muhammad</h3>
                <p class="text-purple-300 text-sm">Owner</p>
            </div>
        </div>

        <h2 class="text-3xl font-bold mb-8 border-r-4 border-blue-500 pr-4">Founders</h2>
        <div class="flex flex-wrap gap-8 mb-12">
            </div>

        <h2 class="text-3xl font-bold mb-8 border-r-4 border-green-500 pr-4">Staff</h2>
        <div class="flex flex-wrap gap-8">
            <div class="member-card">
                <img src="https://cdn.discordapp.com/attachments/1499082581956886651/1517934672481489068/avatar_803.png" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-green-500">
                <h3 class="font-bold">Faisal</h3>
                <p class="text-green-300 text-sm">Staff</p>
            </div>
        </div>
    </section>

    <script>
        function showTeam() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('team-page').style.display = 'block';
        }
    </script>
</body>
</html>
