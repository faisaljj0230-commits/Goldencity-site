<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }
        
        /* القسم الأول */
        .hero-section { position: relative; height: 100vh; width: 100%; background: url('https://files.catbox.moe/ymmvot.png') center/cover no-repeat; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1; }

        /* الهيدر */
        header { position: absolute; top: 0; left: 0; width: 100%; height: 70px; background: rgba(0, 0, 0, 0.4); display: flex; justify-content: space-between; align-items: center; padding: 0 50px; box-sizing: border-box; z-index: 100; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .header-right { font-weight: 900; font-size: 1.2rem; }
        .header-center { display: flex; gap: 30px; }
        .header-center a { color: #fff; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }
        .header-center a:hover { opacity: 1; color: #ff6600; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-small { padding: 6px 16px; border-radius: 4px; text-decoration: none; font-size: 0.85rem; font-weight: bold; }
        .btn-orange { background: #ff6600; color: #000; }
        .btn-login { border: 1px solid rgba(255,255,255,0.3); color: #fff; }
        
        .right-side { position: absolute; right: 5%; bottom: 10%; text-align: right; max-width: 400px; z-index: 2; }
        .thanks { font-size: 4rem; font-weight: 900; line-height: 1; }
        .thanks span { color: #ff6600; }

        /* القسم الثاني: مجتمع دريم */
        .community-section {
            position: relative;
            min-height: 60vh;
            width: 100%;
            background: url('https://files.catbox.moe/9napz9.png') center/cover no-repeat;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 100px 20px; box-sizing: border-box;
        }
        .stats-container { display: flex; gap: 80px; margin-top: 50px; }
        .stat-item { text-align: center; }
        .stat-number { font-size: 2.5rem; font-weight: 900; color: #ff6600; display: block; }
        .stat-label { font-size: 1rem; color: #fff; opacity: 0.8; }
        .community-title { font-size: 3rem; font-weight: 900; margin-bottom: 40px; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="overlay"></div>
        <header>
            <div class="header-right">DREAM TOWN</div>
            <div class="header-center">
                <a href="#">الرئيسية</a><a href="#">صناع المحتوى</a><a href="#">الفريق</a><a href="#">البث المباشر</a><a href="#">الوظائف</a><a href="#">الأسئلة</a><a href="#">المتصدرين</a>
            </div>
            <div class="header-left">
                <a href="#" class="btn-small btn-login">تسجيل الدخول</a>
                <a href="#" class="btn-small btn-orange">المتجر</a>
            </div>
        </header>

        <div class="right-side">
            <h1 class="thanks">شكراً <br> <span>لكم</span></h1>
        </div>
    </div>

    <!-- قسم مجتمع دريم -->
    <div class="community-section">
        <h2 class="community-title">مجتمع دريم</h2>
        <div class="stats-container">
            <div class="stat-item"><span class="stat-number">850+</span><span class="stat-label">عضو</span></div>
            <div class="stat-item"><span class="stat-number">+50</span><span class="stat-label">لاعب</span></div>
            <div class="stat-item"><span class="stat-number">+30</span><span class="stat-label">ميزة</span></div>
            <div class="stat-item"><span class="stat-number">24/7</span><span class="stat-label">دعم فني</span></div>
        </div>
    </div>

</body>
</html>
