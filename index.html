<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Golden City RP</title>
    <style>
        body { background: linear-gradient(135deg, #4c1d95, #000000); min-height: 100vh; }
        /* هذا الكود لإخفاء قسم الفريق مبدئياً */
        #team { display: none; }
    </style>
</head>
<body class="text-white font-sans">

    <!-- شريط القائمة -->
    <nav class="w-full bg-gray-900/80 p-6 flex justify-between items-center shadow-lg sticky top-0 z-50">
        <ul class="flex gap-6 font-medium text-sm">
            <li class="hover:text-purple-400 cursor-pointer">الرئيسية</li>
            <li class="hover:text-purple-400 cursor-pointer">صناع المحتوى</li>
            <!-- زر الفريق الذي سيقوم بإظهار القسم -->
            <li class="hover:text-purple-300 cursor-pointer" onclick="showTeam()">الفريق</li>
            <li class="hover:text-purple-300 cursor-pointer">البث المباشر</li>
            <li class="hover:text-purple-300 cursor-pointer">الوظائف</li>
            <li class="hover:text-purple-300 cursor-pointer">الأسئلة</li>
            <li class="hover:text-purple-300 cursor-pointer">المتصدرين</li>
        </ul>
        <div class="flex items-center gap-2">
            <h1 class="text-xl font-bold tracking-widest text-white">GOLDEN CITY</h1>
            <div class="w-8 h-8 bg-purple-600 rounded flex items-center justify-center font-bold">GC</div>
        </div>
    </nav>

    <!-- المحتوى الرئيسي -->
    <main class="text-center mt-32 mb-20">
        <h2 class="text-6xl font-extrabold mb-6">مرحباً بك في <span class="text-purple-400">Golden City</span></h2>
        <p class="text-xl text-gray-200 mb-10">أفضل تجربة رول بلاي بانتظارك، انضم لمجتمعنا الآن.</p>
        <a href="https://discord.gg/CwZftmkaH" class="bg-white text-purple-900 px-10 py-4 rounded-full font-bold text-lg hover:bg-purple-100 transition">انضم للسيرفر</a>
    </main>

    <!-- قسم الفريق (مخفي حالياً) -->
    <section id="team" class="py-20 text-center">
        <!-- (هنا تضع محتويات قسم الفريق كما هي سابقاً) -->
        <h2 class="text-2xl font-bold mb-8 text-yellow-500">GC | Owner 👑</h2>
        <!-- ... باقي البطاقات ... -->
    </section>

    <!-- كود بسيط لإظهار القسم عند النقر -->
    <script>
        function showTeam() {
            document.getElementById('team').style.display = 'block';
            document.getElementById('team').scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
