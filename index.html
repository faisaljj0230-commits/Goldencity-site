<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        
        /* استخدمت رابط مباشر ومستقر من Unsplash كبديل مؤقت */
        .hero-bg { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-black text-white">

    <div class="hero-bg flex flex-col min-h-screen">
        <nav class="flex justify-between items-center p-8 w-full z-10">
            <div class="text-2xl font-black italic tracking-tighter">GOLDEN<span class="text-purple-500">CITY</span></div>
            <div class="flex gap-8 text-sm font-light text-gray-400">
                <a href="#" class="hover:text-white transition">الرئيسية</a>
                <a href="#" class="hover:text-white transition">الفريق</a>
            </div>
        </nav>

        <main class="flex-grow flex flex-col justify-end p-12">
            <div class="max-w-xl mb-12">
                <div class="inline-block border border-gray-700 bg-black/40 px-4 py-1 rounded-full text-xs text-purple-300 mb-6">
                    رقم 1 كأفضل مجتمع حياة واقعية في الشرق الأوسط
                </div>
                <h1 class="text-xl font-light text-purple-400 mb-4 tracking-widest uppercase">
                    GC حيث تصبح الاحلام حقيقه
                </h1>
                <p class="text-gray-300 text-lg leading-relaxed border-r-2 border-white pr-6">
                    في Golden City، نحن لا نبني مجرد مدينة، نحن نصنع أسطورة تعيشها بتفاصيلها. عالمك، قرارك، وقصتك التي تُكتب هنا.
                </p>
                <div class="mt-8">
                    <a href="https://discord.gg/CwZftmkaH" class="text-3xl text-white hover:text-purple-500 transition duration-300">
                        <i class="fab fa-discord"></i>
                    </a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
