<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        
        .hero-bg { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('https://files.catbox.moe/ner2qh.jpeg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-black text-white">

    <div class="hero-bg flex flex-col min-h-screen">
        
        <!-- الشريط الأسود العلوي -->
        <div class="w-full bg-black/70 backdrop-blur-sm border-b border-red-900/50">
            <nav class="max-w-7xl mx-auto flex justify-between items-center px-8 py-4">
                
                <!-- اليمين: زر المتجر (بالأحمر الغامق) -->
                <div class="flex items-center">
                    <a href="#" class="bg-red-900 hover:bg-red-800 text-white px-5 py-1.5 rounded text-sm transition font-bold shadow-lg shadow-red-900/20">
                        المتجر
                    </a>
                </div>

                <!-- المنتصف: الروابط (تنسيق أحمر) -->
                <div class="flex gap-6 text-sm font-light text-gray-300">
                    <a href="#" class="hover:text-red-500 transition">المتصدّرين</a>
                    <a href="#" class="hover:text-red-500 transition">الأسئلة</a>
                    <a href="#" class="hover:text-red-500 transition">الوظائف</a>
                    <a href="#" class="hover:text-red-500 transition">البث المباشر</a>
                    <a href="#" class="hover:text-red-500 transition">الفريق</a>
                    <a href="#" class="hover:text-red-500 transition font-bold text-white border-b-2 border-red-700">الرئيسية</a>
                </div>

                <!-- اليسار: الشعار والاسم (تنسيق أحمر) -->
                <div class="flex items-center gap-3">
                    <span class="text-lg font-bold tracking-widest uppercase">GOLDEN <span class="text-red-600">CITY</span></span>
                    <img src="http://i.imgur.com/JUs4D7V.jpeg" alt="Logo" class="w-8 h-8 object-contain rounded-full border border-red-900">
                </div>
            </nav>
        </div>

        <!-- المحتوى الرئيسي -->
        <main class="flex-grow flex flex-col justify-end p-12">
            <div class="max-w-xl mb-12">
                <div class="inline-block border border-red-900 bg-red-950/40 px-4 py-1 rounded-full text-xs text-red-300 mb-6">
                    رقم 1 كأفضل مجتمع حياة واقعية في الشرق الأوسط
                </div>
                <h1 class="text-xl font-light text-red-500 mb-4 tracking-widest uppercase">
                    GC حيث تصبح الاحلام حقيقه
                </h1>
                <p class="text-gray-300 text-lg leading-relaxed border-r-2 border-red-700 pr-6">
                    في Golden City، نحن لا نبني مجرد مدينة، نحن نصنع أسطورة تعيشها بتفاصيلها. عالمك، قرارك، وقصتك التي تُكتب هنا.
                </p>
                <div class="mt-8">
                    <a href="https://discord.gg/CwZftmkaH" class="text-3xl text-white hover:text-red-600 transition duration-300">
                        <i class="fab fa-discord"></i>
                    </a>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
