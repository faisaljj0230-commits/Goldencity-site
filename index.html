<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        
        .hero-bg { 
            /* هنا ستحط الكود الطويل جداً الذي نسخته بدلاً من كلمة رابط_الصورة_هنا */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('رابط_الصورة_هنا'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-black text-white">
    <div class="hero-bg flex flex-col min-h-screen">
        <main class="flex-grow flex flex-col justify-end p-12">
             <div class="max-w-xl mb-12">
                <h1 class="text-xl font-light text-purple-400 mb-4 tracking-widest uppercase">
                    GC حيث تصبح الاحلام حقيقه
                </h1>
                <p class="text-gray-300 text-lg leading-relaxed border-r-2 border-white pr-6">
                    في Golden City، نحن لا نبني مجرد مدينة، نحن نصنع أسطورة تعيشها بتفاصيلها.
                </p>
            </div>
        </main>
    </div>
</body>
</html>
