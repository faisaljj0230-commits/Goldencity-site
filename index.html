<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden;
               background: url('https://files.catbox.moe/sp6vy2.png') center/cover no-repeat; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }

        /* الهيدر الاحترافي العائم */
        header { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 1200px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; box-sizing: border-box;
        }
        
        .header-right { font-weight: 900; font-size: 1.2rem; }
        .header-center { display: flex; gap: 25px; }
        .header-center a { color: #fff; text-decoration: none; font-size: 0.85rem; opacity: 0.8; transition: 0.3s; }
        .header-center a:hover { opacity: 1; color: #ff6600; }
        
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-small { padding: 6px 16px; border-radius: 6px; text-decoration: none; font-size: 0.85rem; font-weight: bold; transition: 0.3s; }
        .btn-orange { background: #ff6600; color: #fff; }
        .btn-login { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: #fff; }
        .lang-icon { font-size: 1.2rem; cursor: pointer; opacity: 0.7; }

        /* المحتوى */
        .right-side { position: absolute; right: 5%; bottom: 10%; text-align: right; max-width: 400px; }
        .thanks { font-size: 4rem; font-weight: 900; line-height: 1; }
        .thanks span { color: #ff6600; }
        .desc { font-size: 0.9rem; color: #ccc; margin-top: 10px; }
        
        /* الأيقونات */
        .footer-icons { display: flex; gap: 10px; margin-top: 20px; }
        .icon-box { 
            width: 40px; height: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 8px; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .icon-img { width: 22px; filter: brightness(0) invert(1) opacity(0.6); }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <header>
        <div class="header-right">DREAM TOWN</div>
        
        <div class="header-center">
            <a href="#">المتصدرين</a>
            <a href="#">الأسئلة</a>
            <a href="#">الوظائف</a>
            <a href="#">البث المباشر</a>
            <a href="#">الفريق</a>
            <a href="#">صناع المحتوى</a>
            <a href="#">الرئيسية</a>
        </div>

        <div class="header-left">
            <div class="lang-icon">🌐</div>
            <a href="#" class="btn-small btn-login">تسجيل الدخول</a>
            <a href="#" class="btn-small btn-orange">المتجر</a>
        </div>
    </header>

    <div class="right-side">
        <h1 class="thanks">شكراً <br> <span>لكم</span></h1>
        <p class="desc">أفضل تجربة حياة واقعية في GTA V، تضم لأكثر من 300 ألف لاعب في عالم مليء بالأحداث والقصص التي لا تنتهي.</p>
        
        <div class="footer-icons">
            <div class="icon-box">
                <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" class="icon-img">
            </div>
            <div class="icon-box">
                <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="icon-img">
            </div>
        </div>
    </div>
</body>
</html>
