<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Golden City RP</title>
    <style>
        body { 
            background: linear-gradient(rgba(76, 29, 149, 0.6), rgba(0, 0, 0, 0.9)), 
                        url('https://cdn.discordapp.com/attachments/1500948461044895864/1517948188403826698/IMG_4212.png');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }
        #team-section { display: none; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; }
    </style>
</head>
<body class="text-white font-sans">

    <!-- القائمة العلوية -->
    <nav class="w-full bg-black/50 backdrop-blur-md p-6 flex justify-between items-center sticky top-0 z-50">
        <ul class="flex gap-6 font-medium text-sm">
            <li class="hover:text-purple-300 cursor-pointer" onclick="location.reload()">الرئيسية</li>
            <li class="hover:text-purple-300 cursor-pointer">صناع المحتوى</li>
            <li class="hover:text-purple-300 cursor-pointer" onclick="showTeam()">الفريق</li>
            <li class="hover:text-purple-300 cursor-pointer">البث المباشر</li>
            <li class="hover:text-purple-300 cursor-pointer">الوظائف</li>
            <li class="hover:text-purple-300 cursor-pointer">الأسئلة</li>
            <li class="hover:text-purple-300 cursor-pointer">المتصدرين</li>
        </ul>
        <div class="font-bold text-lg">GOLDEN CITY</div>
    </nav>

    <!-- الصفحة الرئيسية -->
    <main id="main-content" class="h-[80vh] flex flex-col justify-center items-start pr-16">
        <h1 class="text-7xl font-black mb-6">حيث تصبح الأحلام حقيقة</h1>
        <a href="https://discord.gg/CwZftmkaH" class="bg-white text-purple-900 px-10 py-4 rounded-lg font-bold">انضم للسيرفر</a>
    </main>

    <!-- قسم الفريق -->
    <section id="team-section" class="py-20 px-10">
        <h2 class="text-3xl font-bold mb-16 text-center">GC Owners</h2>
        <div class="team-grid justify-items-center">
            <!-- مثال لعضو فريق -->
            <div class="flex flex-col items-center">
                <img src="https://cdn.discordapp.com/attachments/1500948461044895864/1517932663963390011/IMG_7805.jpg" class="w-32 h-32 rounded-full border-2 border-purple-500 mb-4">
                <h3 class="font-bold text-lg">Abu Muhammad</h3>
                <p class="text-purple-400 text-sm">Owner</p>
                <div class="flex gap-2 mt-2 text-gray-400">
                    <i class="fab fa-discord"></i> <i class="fab fa-tiktok"></i>
                </div>
            </div>
            <!-- يمكنك تكرار هذا الـ div لكل عضو فريق بنفس الطريقة -->
        </div>
    </section>

    <script>
        function showTeam() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('team-section').style.display = 'block';
        }
    </script>
</body>
</html>
