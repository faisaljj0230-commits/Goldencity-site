<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        
        .hero-bg { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
                        url('http://i.imgur.com/dAHL0a0.gif'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-black text-white">

    <div class="hero-bg flex flex-col min-h-screen">
        <nav class="flex justify-between items-center px-10 py-6 w-full z-10 bg-black/20 backdrop-blur-sm border-b border-white/10">
            
            <div>
                <a href="#" class="px-6 py-2 border border-purple-600 hover:bg-purple-600 text-purple-400 hover:text-white rounded-full text-sm font-bold transition-all duration-300">
                    المتجر
                </a>
            </div>

            <div class="hidden md:flex gap-6 text-sm font-bold text-gray-300">
                <a href="#" class="hover:text-white hover:border-b-2 border-purple-500 transition-all duration-300 pb-1">المتصدّرين</a>
                <a href="#" class="hover:text-white hover:border-b-2 border-purple-500 transition-all duration-300 pb-1">الأسئلة</a>
                <a href="#" class="hover:text-white hover:border-b-2 border-purple-500 transition-all duration-300 pb-1">الوظائف</a>
                <a href="#" class="hover:text-white hover:border-b-2 border-purple-500 transition-all duration-300 pb-1">البث المباشر</a>
                <a href="#" class="hover:text-white hover:border-b-2 border-purple-500 transition-all duration-300 pb-1">الفريق</a>
                <a href="#" class="hover:text-white hover:border-b-2 border-purple-500 transition-all duration-300 pb-1">الرئيسية</a>
            </div>

            <div class="flex items-center gap-3">
                <span class="text-xl font-black tracking-widest uppercase">GOLDEN <span class="text-purple-500">CITY</span></span>
                <img src="http://i.imgur.com/JUs4D7V.jpeg" alt="Logo" class="w-10 h-10 object-contain">
            </div>
        </nav>

        <main class="flex-grow flex flex-col justify-end p-12">
            <div class="max-w-xl mb-12">
                <div class="inline-block border border-purple-900 bg-purple-900/20 px-4 py-1 rounded-full text-xs text-purple-300 mb-6">
                    رقم 1 كأفضل مجتمع حياة واقعية في الشرق الأوسط
                </div>
                <h1 class="text-4xl md:text-5xl font-black text-white mb-4 uppercase italic tracking-tighter">
                    حيث تصبح الاحلام حقيقه
                </h1>
                <p class="text-gray-300 text-lg leading-relaxed border-r-4 border-purple-600 pr-6">
                    في Golden City، نحن لا نبني مجرد مدينة، نحن نصنع أسطورة تعيشها بتفاصيلها. عالمك، قرارك، وقصتك التي تُكتب هنا.
                </p>
                <div class="mt-8">
                    <a href="https://discord.gg/CwZftmkaH" class="text-4xl text-white hover:text-purple-500 transition duration-300">
                        <i class="fab fa-discord"></i>
                    </a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
