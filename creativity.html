<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden City | القوانين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: white; }
    </style>
</head>
<body class="min-h-screen">

    <!-- القائمة العلوية -->
    <div class="w-full bg-black/70 backdrop-blur-sm border-b border-red-900/50 mb-12">
        <nav class="max-w-7xl mx-auto flex justify-between items-center px-8 py-4">
            <span class="text-lg font-bold uppercase tracking-widest">GOLDEN CITY</span>
            <div class="flex flex-row-reverse gap-6 text-sm">
                <a href="index.html" class="hover:text-red-500 transition">الرئيسية</a>
                <a href="creativity.html" class="hover:text-red-500 transition">الابداع</a>
                <a href="team.html" class="hover:text-red-500 transition">الفريق</a>
                <a href="rules.html" class="text-red-500 border-b-2 border-red-700 font-bold transition">القوانين</a>
            </div>
        </nav>
    </div>

    <!-- حاوية القوانين -->
    <div class="max-w-3xl mx-auto px-8 pb-20">
        <h1 class="text-4xl font-black text-center mb-8">دستور المدينة</h1>
        
        <!-- القائمة المنسدلة -->
        <select id="ruleSelect" onchange="updateRules()" class="w-full bg-gray-900 border border-red-900 text-white p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-700 transition cursor-pointer mb-8 text-center font-bold text-lg">
            <option value="roleplay">RolePlay Rules</option>
            <option value="criminal">Criminal Rules</option>
            <option value="discord">Discord Rules</option>
            <option value="safe">Safe Area</option>
            <option value="injury">Injury Rules</option>
        </select>

        <!-- منطقة عرض القوانين -->
        <div id="content" class="bg-gray-900/20 border border-red-900/50 p-8 rounded-xl min-h-[300px]">
            <h2 id="title" class="text-2xl font-bold mb-6 text-red-500 uppercase border-b border-red-900 pb-2">RolePlay Rules</h2>
            <div id="text" class="text-gray-300 leading-relaxed space-y-4">
                <p>يرجى اختيار القسم من القائمة أعلاه لعرض القوانين الخاصة به.</p>
            </div>
        </div>
    </div>

    <script>
        // هنا يمكنك إضافة القوانين الخاصة بك
        const rules = {
            roleplay: { title: "RolePlay Rules", body: "اكتب هنا قوانين الرول بلاي الخاصة بك..." },
            criminal: { title: "Criminal Rules", body: "اكتب هنا قوانين الجريمة..." },
            discord: { title: "Discord Rules", body: "اكتب هنا قوانين الديسكورد..." },
            safe: { title: "Safe Area", body: "اكتب هنا قوانين المناطق الآمنة..." },
            injury: { title: "Injury Rules", body: "اكتب هنا قوانين الإصابات..." }
        };

        function updateRules() {
            const select = document.getElementById("ruleSelect").value;
            document.getElementById("title").innerText = rules[select].title;
            document.getElementById("text").innerHTML = rules[select].body;
        }

        // عرض القوانين عند تحميل الصفحة
        window.onload = updateRules;
    </script>
</body>
</html>
