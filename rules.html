<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden City | القوانين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: white; }
    </style>
</head>
<body class="min-h-screen">

    <div class="w-full bg-black/70 backdrop-blur-sm border-b border-red-900/50 mb-12">
        <nav class="max-w-7xl mx-auto flex justify-between items-center px-8 py-4">
            <span class="text-lg font-bold uppercase tracking-widest text-red-600">GOLDEN CITY</span>
            <div class="flex flex-row-reverse gap-6 text-sm">
                <a href="index.html" class="hover:text-red-500 transition">الرئيسية</a>
                <a href="creativity.html" class="hover:text-red-500 transition">الابداع</a>
                <a href="team.html" class="hover:text-red-500 transition">الفريق</a>
                <a href="rules.html" class="text-red-500 border-b-2 border-red-700 font-bold transition">القوانين</a>
            </div>
        </nav>
    </div>

    <div class="max-w-4xl mx-auto px-8 pb-20">
        <h1 class="text-4xl font-black text-center mb-8 text-white">دستور المدينة</h1>
        
        <select id="ruleSelect" onchange="updateRules()" class="w-full bg-gray-900 border-2 border-red-900 text-white p-4 rounded-lg cursor-pointer mb-8 text-center font-bold text-lg">
            <option value="rp">Roleplay Rules</option>
            <option value="rp1">Roleplay Rules 1</option>
            <option value="rp2">Roleplay Rules 2</option>
            <option value="criminal">Criminal Rules</option>
            <option value="safe">Safe Area</option>
            <option value="theft">Theft Rules</option>
            <option value="factory">Factory Rules</option>
        </select>

        <div class="bg-gray-900/30 border border-red-900/50 p-8 rounded-xl">
            <h2 id="title" class="text-2xl font-bold mb-6 text-red-500 uppercase border-b border-red-900 pb-2">Roleplay Rules 2</h2>
            <div id="text" class="text-gray-300 leading-relaxed space-y-4 text-sm md:text-base">
                <!-- القوانين ستظهر هنا -->
            </div>
        </div>
    </div>

    <script>
        const rules = {
            rp: { 
                title: "Roleplay Rules", 
                body: "[1] - احترام الجميع و عدم السب و اهانة اي شخص مهما كانت الظروف ولو بطريقة غير مباشرة<br><br>[2] - عدم وضع الروابط او وضع روابط تحتوي دعوات لسيرفرات اخرى<br><br>[3] - عدم التدخل في شؤون الاخرين او شخصنة الحوارات<br><br>[4] - عدم الخوض بالامور الدينية او السياسية او التطرق لها بأي شكل من الاشكال<br><br>[5] - تعدد الحسابات غير مسموح به ، إمتلاك أكثر من حساب ديسكورد في السيرفر عليها باند نهائي<br><br>[6] - يمنع انتحال الشخصيات الإدارية ومن يخالف القانون هذا سوف يتبند<br><br>[7] - يمنع السخرية والإستهزاء من الآخرين ، وسيتم منعه من الكتابة بجميع الشاتات واذا تكرر الامر قد تصل الى التحذير<br><br>[8] - يمنع الاستفسار بالشات العام ، عندك استفسار او سؤال توجه الى الدعم الفني في حال انك خالفت راح يجيك ميوت" 
            },
            rp1: { 
                title: "Roleplay Rules 1", 
                body: "• في حال كنت تريد سرقة بقالة، يجب عليك تجهيز لستر أو VIP لعدم مداخلة شرطة اللعبة.<br>• [36] في حال تم إلقاء القبض عليك يجب الانصياع للأوامر والصمت، ويمنع الهروب.<br>• [37] يمنع الهروب من المستشفى وهو مرفوع عليك التيزر أو السلاح.<br>• [38] يمنع تركيب أي حزام أو أدوات شرطة/مسعفين أو التشبه بهم.<br>• [39] يحق لك الرجوع في حال تم إسقاطك من قبل العصابة المدنية.<br>• [40] لا يحق لك الرجوع في حال طحت، وتعتبر مسقطًا حتى ترجع موقع إسقاطك.<br>• [41] في حال تكرار إسقاطك من قبل الشرطة المدنية سيتم مساءلتك إداريًا.<br>• [42] في حال رجعت في سيناريو، يجب أن تجعلهم يلاحظونك أولاً ثم تبدأ بإطلاق النار.<br>• [43] يمنع منعًا باتًا التحدث في الـ Everyone.<br><br><strong>ملاحظة:</strong> في حال كان الشخص أمامك تقدر ترسل له VIP وتتكلم معه.<br><br>• [44/45] في حال الحجز المالي يمنع الشراء، التحويل، الإيداع، أو السحب من البنك.<br>• [46] يمنع استخدام أي سلاح غير مسموح أو غير موجود في الحقيبة.<br>• [47] يسمح باستخدام الأسلحة الموجودة معك في الحقيبة.<br>• [48] يمنع الهروب من الشرطة بعد إنعاشك.<br>• [49] التواصل غير الشرعي (معلومات من خارج المدينة/بث/يوتيوب تعتبر مخالفة).<br>• [50] يمنع إهانة الشخص المسقط.<br><br><strong>بخصوص إعادة السيناريو:</strong> لا يوجد شيء بمسمى إعادة سيناريو، يكمل السيناريو وتُرفع شكوى لاحقًا للتعويض.<br>• يجب على العسكر والمواطنين إنشاء مجموعة خاصة على السوني لتجنب الإزعاج.<br>• عند المطاردة يتم الانتقال من المجموعة إلى الموجة الخاصة.<br>• يمنع النقاش في الموجة العامة." 
            },
            rp2: { 
                title: "Roleplay Rules 2", 
                body: "50- في حال تم اسقاطك يجب الرجوع لموقع الاسقاط في نفس الوقت.<br>51- يمنع استعمال جهاز الصعق على شخص يحمل سلاح في يده.<br>52- عند فشل التفاوض يمنع اطلاق النار حتى مرور 15 ثانية مع العد.<br>53- يمنع استعمال الدراجات النارية من المدنيين في حال عدم امتلاكها في الحقيبة الشخصية.<br>54- اذا انعدمت كعصابة او منظمة يمنع الرجوع لنفس الوظيفة ويستثنى الشرطة والمواطنين والموظفين.<br>55- يمنع استعمال السكين على شخص يملك سلاح في يده.<br>57- يمنع طعن او ضرب العسكري اثناء الاستيقاف المروري.<br>58- في حال تم اعدامك يتم حذف الكركتر بشكل نهائي. -# يرجاء الخوف على حياتك بقدر المستطاع.<br>59- ممنوع الاعتداء على المدنيين لاي سبب ويجب ان تعتبره مواطن.<br>60- ممنوع قتل الأشخاص في حال كانوا ينفذون الأوامر - ملغي -.<br>61- يمنع الغدر أو الخيانة في وزارة الداخلية -# يجب وجود سبب مقنع.<br>62- ممنوع استخدام أسماء غير واقعية أو ساخرة.<br>63- الالتزام بالزي المناسب.<br>64- ممنوع خرق القوانين لتحقيق مكاسب شخصية.<br>65- يجب أن يكون لديك خطة واضحة أثناء السرقة أو الخطف.<br>66- الالتزام بعدم التلاعب بالقوانين.<br>67- ممنوع تجاهل الأحداث التي تؤثر على سير القصة.<br>68- ممنوع الحديث عن القوانين أو تقديم شكاوى أثناء اللعب.<br>69- الالتزام بقوانين المرور.<br>70- لا تهرب بسيارة تالفة.<br>71- ممنوع القيادة بسرعة غير واقعية في مناطق مزدحمة.<br>72- يمنع سرقة المركبات إلى بوجود فاتح اقفال.<br>73- يجب إصلاح السيارة عند تعرضها للتلف.<br>74- يمنع سرقة الطائرات/الدبابات.<br>75- ممنوع سرقة المركبات العسكرية. -# تنبيه على القيادة الغير واقعية. -# يمنع استخدام حركه رفع الدباب والنط من أي مكان.<br>76- يمنع تقليد ملابس الشرطة والاسعاف.<br>77- يمنع الخروج عن الرول بلاي.<br>78- في حال اضافه لصق على فمك يمنع اصدار اي صوت.<br>79- يمنع التدخل في سيناريو قائم لا صلة لك فيه.<br>80- الشخصنة ممنوعة منعا باتا.<br>81- ممنوع الكلام المشفر بغرض السب.<br>82- يمنع الخروج من السيرفر اثناء السيناريو.<br>83- يجب إحترام الجميع.<br>84- يجب عليك اخذ المواقف الجدية بشكل جدي.<br>85- التعرف على الشخص عن طريق الشكل فقط.<br>86- اذا تم اسقاطك بواسطة اخوياك تعتبر مسقط.<br>87- اذا حصل تبادل اطلاق نار واسقطت من قبل مدني يلزم العودة الى مكان الاشتباك.<br>88- التصبيع ممنوع.<br>89- يمنع حبس/سجن شخص للأسباب غير مقنعة -# للشخص المحتجز: يمنع الهروب من الموقع او اعلام احد به." 
            },
            criminal: { title: "Criminal Rules", body: "قوانين الجرائم..." },
            safe: { title: "Safe Area", body: "قوانين المناطق الآمنة..." },
            theft: { title: "Theft Rules", body: "قوانين السرقة..." },
            factory: { title: "Factory Rules", body: "قوانين المصنع..." }
        };

        function updateRules() {
            const select = document.getElementById("ruleSelect").value;
            document.getElementById("title").innerText = rules[select].title;
            document.getElementById("text").innerHTML = rules[select].body;
        }

        window.onload = updateRules;
    </script>
</body>
</html>
