<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: white; margin: 0; }
        
        /* خلفية الصفحة مطابقة للصورة التي أرسلتها */
        .rules-bg { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://files.catbox.moe/v94tqh.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* تنسيق الأزرار (القوانين) الرصاصية */
        .rule-section { background-color: #1a1a1a; margin-bottom: 10px; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .rule-section:hover { border-right: 4px solid #b91c1c; }
        .rule-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .rule-content { padding: 20px; border-top: 1px solid #333; background: #121212; display: none; }
    </style>
</head>
<body class="rules-bg">

    <nav class="max-w-7xl mx-auto flex justify-between items-center px-8 py-6">
        <span class="text-xl font-bold tracking-widest">GOLDEN CITY</span>
        <div class="flex gap-8 text-sm font-bold text-gray-400">
            <a href="index.html" class="hover:text-red-500 transition">الرئيسية</a>
            <a href="rules.html" class="text-red-500 border-b-2 border-red-700">القوانين</a>
            <a href="store.html" class="hover:text-red-500 transition">المتجر</a>
            <a href="apply.html" class="hover:text-red-500 transition">التقديمات</a>
            <a href="creativity.html" class="hover:text-red-500 transition">الإبداع</a>
        </div>
    </nav>

    <div class="text-center py-16">
        <h1 class="text-5xl font-black uppercase">القوانين</h1>
    </div>

    <div class="max-w-3xl mx-auto px-4" id="rules-container">
        
        <div class="rule-section">
            <div class="rule-header" onclick="toggleRule(this)">
                <span>قوانين الرول بلاي</span>
                <i class="fas fa-chevron-down text-sm"></i>
            </div>
            <div class="rule-content text-gray-300 leading-loose">
                هنا ستظهر القوانين الخاصة بك عند الضغط على القسم.
            </div>
        </div>

    </div>

    <script>
        function toggleRule(element) {
            const content = element.nextElementSibling;
            const icon = element.querySelector('i');
            // تبديل العرض
            content.style.display = content.style.display === 'block' ? 'none' : 'block';
            // تبديل السهم
            icon.classList.toggle('fa-chevron-up');
        }
    </script>
</body>
</html>
